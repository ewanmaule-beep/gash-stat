const ALL_CATEGORIES = Object.keys(DATA);

function seededRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getTodayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function dateSeed() { return parseInt(getTodayKey().replace(/-/g,''), 10); }

const DIFFICULTY = [
  { minGapPct: 0.50, maxGapPct: 1.00 },
  { minGapPct: 0.40, maxGapPct: 1.00 },
  { minGapPct: 0.25, maxGapPct: 0.70 },
  { minGapPct: 0.20, maxGapPct: 0.60 },
  { minGapPct: 0.15, maxGapPct: 0.50 },
  { minGapPct: 0.10, maxGapPct: 0.40 },
  { minGapPct: 0.08, maxGapPct: 0.30 },
  { minGapPct: 0.06, maxGapPct: 0.25 },
  { minGapPct: 0.04, maxGapPct: 0.18 },
  { minGapPct: 0.03, maxGapPct: 0.15 },
];

function pickDailyCatKey(rng) {
  return ALL_CATEGORIES[Math.floor(rng() * ALL_CATEGORIES.length)];
}

function generateDailyQuestions() {
  const rng = seededRandom(dateSeed());
  const catKey = pickDailyCatKey(rng);
  const cat = DATA[catKey];
  const items = cat.items;
  const questions = [];
  const usedIndices = new Set(); // each item can only appear ONCE across the whole game

  for (let i = 0; i < 10; i++) {
    const { minGapPct, maxGapPct } = DIFFICULTY[i];

    // Build all valid candidate pairs from unused items, within difficulty band
    const candidates = [];
    for (let a = 0; a < items.length; a++) {
      if (usedIndices.has(a)) continue;
      for (let b = 0; b < items.length; b++) {
        if (b === a || usedIndices.has(b)) continue;
        if (items[a].value === items[b].value) continue;
        const maxVal = Math.max(items[a].value, items[b].value);
        const gapPct = Math.abs(items[a].value - items[b].value) / maxVal;
        if (gapPct >= minGapPct && gapPct <= maxGapPct) candidates.push([a, b]);
      }
    }

    // Shuffle
    for (let k = candidates.length - 1; k > 0; k--) {
      const j = Math.floor(rng() * (k + 1));
      [candidates[k], candidates[j]] = [candidates[j], candidates[k]];
    }

    let picked = candidates.length > 0 ? candidates[0] : null;

    // Fallback: relax upper bound if nothing found in band
    if (!picked) {
      const loose = [];
      for (let a = 0; a < items.length; a++) {
        if (usedIndices.has(a)) continue;
        for (let b = 0; b < items.length; b++) {
          if (b === a || usedIndices.has(b)) continue;
          if (items[a].value === items[b].value) continue;
          const maxVal = Math.max(items[a].value, items[b].value);
          const gapPct = Math.abs(items[a].value - items[b].value) / maxVal;
          if (gapPct >= minGapPct) loose.push([a, b]);
        }
      }
      for (let k = loose.length - 1; k > 0; k--) {
        const j = Math.floor(rng() * (k + 1));
        [loose[k], loose[j]] = [loose[j], loose[k]];
      }
      picked = loose.length > 0 ? loose[0] : null;
    }

    if (picked) {
      const [idxA, idxB] = picked;
      usedIndices.add(idxA);
      usedIndices.add(idxB);
      questions.push({
        catKey, metricLabel: cat.metricLabel,
        a: items[idxA], b: items[idxB],
        answer: items[idxB].value > items[idxA].value ? 'higher' : 'lower'
      });
    }
  }
  return questions;
}

function getTodayCategoryInfo() {
  const rng = seededRandom(dateSeed());
  const catKey = pickDailyCatKey(rng);
  return { catKey, label: DATA[catKey].label, metricLabel: DATA[catKey].metricLabel };
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? m + 'm ' + (s % 60) + 's' : s + 's';
}

function getLeaderboard() { try { return JSON.parse(localStorage.getItem('gashstat_lb') || '[]'); } catch { return []; } }

function saveScore(name, score, timeMs, catLabel) {
  const lb = getLeaderboard();
  lb.push({ name, score, total: 10, timeMs, date: getTodayKey(), catLabel, ts: Date.now() });
  localStorage.setItem('gashstat_lb', JSON.stringify(lb));
}

function hasPlayedToday(name) { return getLeaderboard().some(e => e.date === getTodayKey() && e.name === name); }
function markGameStart(name) { localStorage.setItem('gashstat_start_' + getTodayKey(), JSON.stringify({ name, ts: Date.now() })); }

function getPlayerStreak(name) {
  const lb = getLeaderboard().filter(e => e.name === name);
  if (!lb.length) return 0;
  const dates = [...new Set(lb.map(e => e.date))].sort().reverse();
  let streak = 0;
  for (let i = 0; i < dates.length; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ek = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (dates[i] === ek) streak++; else break;
  }
  return streak;
}

const QUESTIONS = generateDailyQuestions();
const TODAY_CAT = getTodayCategoryInfo();

function Dot({ state }) {
  let cls = 'dot';
  if (state === 'correct') cls += ' dot-correct';
  else if (state === 'wrong') cls += ' dot-wrong';
  else if (state === 'current') cls += ' dot-current';
  return React.createElement('div', { className: cls });
}

function LeaderboardView({ playerName }) {
  const [tab, setTab] = useState('today');
  const lb = getLeaderboard();
  const today = getTodayKey();
  const filtered = tab === 'today'
    ? lb.filter(e => e.date === today)
    : lb.filter(e => {
        const d = new Date(today); d.setDate(d.getDate() - 6);
        const dk = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        return e.date >= dk;
      });
  const byNameDate = {};
  filtered.forEach(e => {
    const key = e.name + '|' + e.date;
    if (!byNameDate[key] || e.score > byNameDate[key].score || (e.score === byNameDate[key].score && e.timeMs < byNameDate[key].timeMs))
      byNameDate[key] = e;
  });
  let rows = Object.values(byNameDate);
  if (tab === '7days') {
    const byName = {};
    rows.forEach(e => {
      if (!byName[e.name]) byName[e.name] = { name: e.name, score: 0, timeMs: 0 };
      byName[e.name].score += e.score;
      byName[e.name].timeMs += e.timeMs;
    });
    rows = Object.values(byName);
  }
  rows.sort((a, b) => b.score - a.score || a.timeMs - b.timeMs);
  return (
    <div>
      <div className="lb-tab-row">
        {['today','7days'].map(t => (
          <button key={t} className={'lb-tab' + (tab===t?' lb-tab-active':'')} onClick={() => setTab(t)}>
            {t==='today'?'Today':'7 Days'}
          </button>
        ))}
      </div>
      {rows.length === 0 && <p className="dim" style={{textAlign:'center',padding:'20px 0'}}>No scores yet. Go play!</p>}
      {rows.map((e,i) => (
        <div key={i} className="lb-row">
          <span className={'lb-rank' + (i<3?' lb-rank-'+(i+1):'')}>{i+1}</span>
          <span className="lb-name" style={e.name===playerName?{color:'#FFD700'}:{}}>{e.name}</span>
          <div style={{textAlign:'right'}}>
            <div className="lb-score">{tab==='7days'?e.score:e.score+'/10'}</div>
            <div className="lb-time">{formatTime(e.timeMs)}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('name');
  const [playerName, setPlayerName] = useState(() => localStorage.getItem('gashstat_name') || '');
  const [nameInput, setNameInput] = useState(() => localStorage.getItem('gashstat_name') || '');
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [feedback, setFeedback] = useState(null);
  const [timeLeft, setTimeLeft] = useState(7);
  const [totalTimeMs, setTotalTimeMs] = useState(0);
  const [copied, setCopied] = useState(false);
  const timerRef = useRef(null);
  const answersRef = useRef([]);
  const gameStartRef = useRef(null);

  const qNow = QUESTIONS[currentQ] || QUESTIONS[0];

  function doTimeout() {
    clearInterval(timerRef.current);
    const newAnswers = [...answersRef.current, 'timeout'];
    answersRef.current = newAnswers;
    setAnswers([...newAnswers]);
    setFeedback({ result: 'timeout', q: QUESTIONS[newAnswers.length - 1] || qNow });
    setScreen('feedback');
    setTimeout(() => advanceQ(newAnswers), 2200);
  }

  function startTimer() {
    setTimeLeft(7);
    clearInterval(timerRef.current);
    let t = 7;
    timerRef.current = setInterval(() => {
      t = Math.round((t - 0.1) * 10) / 10;
      setTimeLeft(t);
      if (t <= 0) { clearInterval(timerRef.current); doTimeout(); }
    }, 100);
  }

  function startGame(name) {
    localStorage.setItem('gashstat_name', name);
    setPlayerName(name);
    markGameStart(name);
    answersRef.current = [];
    setAnswers([]);
    setCurrentQ(0);
    gameStartRef.current = Date.now();
    setScreen('game');
    setTimeout(startTimer, 100);
  }

  function handleAnswer(choice) {
    clearInterval(timerRef.current);
    const qIdx = answersRef.current.length;
    const q = QUESTIONS[qIdx];
    const result = choice === q.answer ? 'correct' : 'wrong';
    const newAnswers = [...answersRef.current, result];
    answersRef.current = newAnswers;
    setAnswers([...newAnswers]);
    setFeedback({ result, q });
    setScreen('feedback');
    setTimeout(() => advanceQ(newAnswers), 2200);
  }

  function advanceQ(newAnswers) {
    const next = newAnswers.length;
    if (next >= QUESTIONS.length) {
      const score = newAnswers.filter(a => a === 'correct').length;
      const elapsed = Date.now() - gameStartRef.current;
      setTotalTimeMs(elapsed);
      saveScore(playerName, score, elapsed, TODAY_CAT.label);
      setCurrentQ(9);
      setScreen('results');
    } else {
      setCurrentQ(next);
      setScreen('game');
      setTimeout(startTimer, 100);
    }
  }

  function handleNameSubmit() {
    const name = nameInput.trim();
    if (!name) return;
    localStorage.setItem('gashstat_name', name);
    setPlayerName(name);
    if (hasPlayedToday(name)) setScreen('alreadyPlayed');
    else startGame(name);
  }

  const score = answers.filter(a => a === 'correct').length;
  const emojiGrid = answers.map(a => a === 'correct' ? '🟩' : a === 'wrong' ? '🟥' : '⬛').join('');
  const shareText = 'Gash Stat — ' + getTodayKey() + '\n' + TODAY_CAT.label + '\n' + score + '/10\n' + emojiGrid;

  function copyShare() {
    navigator.clipboard.writeText(shareText).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }).catch(() => {});
  }

  if (screen === 'name') {
    const streak = getPlayerStreak(nameInput.trim());
    return (
      <div className="game-root">
        <div style={{paddingTop: 20}}>
          <div className="logo">GASH STAT</div>
          <div className="logo-sub">DAILY HIGHER OR LOWER</div>

          <div className="category-hero">
            <div className="category-hero-label">Today's Category</div>
            <div className="category-hero-name">{TODAY_CAT.label}</div>
            <div className="category-hero-sub">10 questions · 7 seconds each · everyone plays the same</div>
          </div>

          <div className="card">
            <div className="section-title">Who are you?</div>
            <input
              className="input-field"
              placeholder="Enter your name..."
              value={nameInput}
              onChange={e => setNameInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleNameSubmit()}
              maxLength={20}
              autoFocus
            />
            {nameInput.trim() && streak > 1 && (
              <div style={{marginTop: 10}}><span className="streak-badge">🔥 {streak} day streak</span></div>
            )}
          </div>

          <div className="gap">
            <button className="btn-primary" onClick={handleNameSubmit} disabled={!nameInput.trim()}>PLAY TODAY'S GAME</button>
          </div>
          <div className="gap">
            <button className="btn-secondary" onClick={() => { setPlayerName(nameInput.trim()); setScreen('leaderboard'); }}>GASH LEAGUE</button>
          </div>
          <button className="btn-ghost" onClick={() => setScreen('howToPlay')}>HOW TO PLAY</button>
        </div>
      </div>
    );
  }

  if (screen === 'howToPlay') {
    return (
      <div className="game-root">
        <div style={{paddingTop: 20}}>
          <div className="htp-title">HOW TO PLAY</div>
          <div className="card">
            <div className="htp-row">
              <div className="htp-icon">1</div>
              <div className="htp-text">You see two items from the same category. <b>Item A</b> shows its value. <b>Item B</b> is hidden.</div>
            </div>
            <div className="htp-row">
              <div className="htp-icon">2</div>
              <div className="htp-text">Decide whether Item B's value is <b>higher</b> or <b>lower</b> than Item A. You have <b>7 seconds</b> to answer.</div>
            </div>
            <div className="htp-row">
              <div className="htp-icon">3</div>
              <div className="htp-text">There are <b>10 questions</b> per day. Each correct answer scores 1 point. Wrong answers and timeouts score 0, but the game continues.</div>
            </div>
            <div className="htp-row">
              <div className="htp-icon">4</div>
              <div className="htp-text">Questions get harder as you go. Early rounds have obvious gaps. By round 9 and 10, the differences are tight.</div>
            </div>
            <div className="htp-row">
              <div className="htp-icon">5</div>
              <div className="htp-text"><b>Everyone plays the same questions</b> each day, seeded from the date. One attempt per player per day. No refreshing for a better draw.</div>
            </div>
            <div className="htp-row" style={{borderBottom:'none', paddingBottom:0}}>
              <div className="htp-icon" style={{paddingTop:4}}>●</div>
              <div className="htp-text">
                Track your score on the progress bar:
                <div className="htp-dots">
                  <div className="htp-dot" style={{background:'#4ade80'}}></div><span className="htp-dot-label">correct</span>
                  <div className="htp-dot" style={{background:'#f87171'}}></div><span className="htp-dot-label">wrong</span>
                  <div className="htp-dot" style={{background:'#222'}}></div><span className="htp-dot-label">not played</span>
                </div>
              </div>
            </div>
          </div>
          <button className="btn-primary" onClick={() => setScreen('name')}>GOT IT</button>
        </div>
      </div>
    );
  }

  if (screen === 'alreadyPlayed') {
    const todayEntry = getLeaderboard().filter(e => e.date === getTodayKey() && e.name === playerName).sort((a,b) => b.score - a.score)[0];
    return (
      <div className="game-root">
        <div style={{paddingTop: 20}}>
          <div className="logo">GASH STAT</div>
          <div className="already-played">
            <div className="already-title">ALREADY PLAYED</div>
            <div className="already-sub">Come back tomorrow, {playerName}.</div>
            {todayEntry && (
              <div style={{marginTop: 20}}>
                <div className="score-big">{todayEntry.score}<span style={{fontSize:40,color:'#555'}}>/10</span></div>
                <div className="score-label">YOUR SCORE TODAY</div>
              </div>
            )}
          </div>
          <div className="gap"><button className="btn-primary" onClick={() => setScreen('leaderboard')}>SEE GASH LEAGUE</button></div>
          <button className="btn-secondary" onClick={() => setScreen('name')}>BACK</button>
        </div>
      </div>
    );
  }

  if (screen === 'feedback') {
    const fq = feedback ? feedback.q : qNow;
    const isCorrect = feedback && feedback.result === 'correct';
    const isTimeout = feedback && feedback.result === 'timeout';
    const fbClass = 'feedback-overlay ' + (isCorrect ? 'feedback-correct' : isTimeout ? 'feedback-timeout' : 'feedback-wrong');
    return (
      <div className="game-root">
        <div style={{paddingTop: 10}}>
          <div className="logo" style={{fontSize:32, marginBottom:4}}>GASH STAT</div>
          <div className="progress-dots">
            {Array.from({length:10},(_,i) => {
              const st = i < answers.length ? answers[i] : i === answers.length ? 'current' : 'empty';
              return React.createElement(Dot, {key:i, state:st});
            })}
          </div>
          <div className={fbClass}>
            <div className="feedback-title">{isTimeout ? 'TOO SLOW!' : isCorrect ? 'CORRECT!' : 'WRONG!'}</div>
            <div className="feedback-vals">
              <div className="feedback-val-box">
                <div className="feedback-val-label">ITEM A</div>
                <div className="feedback-val-name">{fq.a.name}</div>
                <div className="feedback-val-num">{fq.a.displayValue}</div>
              </div>
              <div className="feedback-val-box">
                <div className="feedback-val-label">ITEM B</div>
                <div className="feedback-val-name">{fq.b.name}</div>
                <div className="feedback-val-num">{fq.b.displayValue}</div>
              </div>
            </div>
            <div className="metric-badge" style={{marginTop:10}}>{fq.metricLabel}</div>
          </div>
          <p className="dim" style={{textAlign:'center'}}>Next question loading...</p>
        </div>
      </div>
    );
  }

  if (screen === 'results') {
    const streak = getPlayerStreak(playerName);
    return (
      <div className="game-root">
        <div style={{paddingTop:10}}>
          <div className="logo" style={{fontSize:32}}>GASH STAT</div>
          <div className="score-display">
            <div className="score-big">{score}<span style={{fontSize:40,color:'#555'}}>/10</span></div>
            <div className="score-label">{TODAY_CAT.label.toUpperCase()} · {getTodayKey()}</div>
            {streak > 1 && <div style={{marginTop:8}}><span className="streak-badge">🔥 {streak} day streak</span></div>}
          </div>
          <div className="emoji-grid">{emojiGrid}</div>
          <div className="card gap">
            <div className="section-title">SHARE YOUR RESULT</div>
            <div className="share-box">{shareText}</div>
            {copied && <div className="copied-toast">Copied!</div>}
            <button className="btn-primary" onClick={copyShare}>COPY RESULT</button>
          </div>
          <div className="gap"><button className="btn-secondary" onClick={() => setScreen('leaderboard')}>GASH LEAGUE</button></div>
          <p className="dim" style={{textAlign:'center'}}>Finished in {formatTime(totalTimeMs)}</p>
        </div>
      </div>
    );
  }

  if (screen === 'leaderboard') {
    return (
      <div className="game-root">
        <div style={{paddingTop:10}}>
          <div className="logo" style={{fontSize:32}}>GASH LEAGUE</div>
          <div className="logo-sub">WHO'S THE GASHIEST?</div>
          <div className="card"><LeaderboardView playerName={playerName} /></div>
          <button className="btn-secondary" onClick={() => setScreen('name')}>BACK</button>
        </div>
      </div>
    );
  }

  // GAME
  const timerPct = timeLeft / 7;
  const urgent = timeLeft < 3;
  const timerColor = urgent ? '#f87171' : timerPct > 0.5 ? '#4ade80' : '#FFD700';
  const dotStates = Array.from({length:10},(_,i) => {
    if (i < answers.length) return answers[i];
    if (i === currentQ) return 'current';
    return 'empty';
  });

  return (
    <div className="game-root">
      <div style={{paddingTop:8}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6}}>
          <div className="logo" style={{fontSize:26}}>GASH STAT</div>
          <div style={{textAlign:'right'}}>
            <div style={{fontFamily:"'DM Mono', monospace", fontSize:10, color:'#666', letterSpacing:1}}>{TODAY_CAT.label}</div>
            <div style={{fontFamily:"'DM Mono', monospace", fontSize:12, color:'#555'}}>Q{currentQ+1}/10</div>
          </div>
        </div>
        <div className="progress-dots">{dotStates.map((s,i) => React.createElement(Dot, {key:i, state:s}))}</div>
        <div className="timer-text" style={{color: urgent ? '#f87171' : '#f0f0f0'}}>{Math.ceil(timeLeft)}s</div>
        <div className="timer-bar-wrap">
          <div className="timer-bar" style={{width:(timerPct*100)+'%', background:timerColor}} />
        </div>
        <div className="metric-badge">{qNow.metricLabel}</div>
        <div className="card card-accent">
          <div className="item-label">ITEM A</div>
          <div className="item-name">{qNow.a.name}</div>
          <div className="item-value">{qNow.a.displayValue}</div>
        </div>
        <div className="vs-divider">VS</div>
        <div className="card" style={{marginTop:4}}>
          <div className="item-label">ITEM B</div>
          <div className="item-name">{qNow.b.name}</div>
          <div className="item-value" style={{color:'#444'}}>???</div>
        </div>
        <p style={{textAlign:'center', color:'#555', fontFamily:"'DM Mono', monospace", fontSize:12, margin:'8px 0 10px'}}>
          Is {qNow.b.name}'s {qNow.metricLabel} higher or lower?
        </p>
        <div className="btn-row">
          <button className="btn btn-higher" onClick={() => handleAnswer('higher')}>▲ HIGHER</button>
          <button className="btn btn-lower" onClick={() => handleAnswer('lower')}>▼ LOWER</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
